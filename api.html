<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Country Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="nav-buttons">
        <a href="index.html">Home</a>
        <a href="saved.html">Saved</a>
      </div>

      <h1>Country Finder</h1>
      <p>Search and save country information</p>
    </header>

    <main>
      <h2>Search Country</h2>

      <form
        onsubmit="
          event.preventDefault();
          searchCountry();
        "
      >
        <label>Enter Country Name</label>
        <input type="text" id="countryInput" placeholder="e.g. Japan" />
        <button type="submit">Search</button>
      </form>

      <div id="result"></div>
    </main>

    <footer>
      <p>API Integration Activity</p>
    </footer>

    <script>
      let currentCountry = null;

      function searchCountry() {
        const country = document.getElementById("countryInput").value;
        const result = document.getElementById("result");

        if (!country) {
          result.innerHTML = "<p>Please enter a country name.</p>";
          return;
        }

        result.innerHTML = "<p>Loading...</p>";

        fetch(`https://restcountries.com/v3.1/name/${country}`)
          .then((res) => {
            if (!res.ok) throw new Error("Country not found");
            return res.json();
          })
          .then((data) => {
            const c = data[0];

            currentCountry = {
              name: c.name.common,
              capital: c.capital ? c.capital[0] : "N/A",
              population: c.population,
              region: c.region,
              flag: c.flags.png,
            };

            result.innerHTML = `
        <div class="profile-card">
          <img src="${currentCountry.flag}">
          <h2>${currentCountry.name}</h2>
          <p><strong>Capital:</strong> ${currentCountry.capital}</p>
          <p><strong>Population:</strong> ${currentCountry.population.toLocaleString()}</p>
          <p><strong>Region:</strong> ${currentCountry.region}</p>
          <div class="profile-actions">
            <button onclick="saveCountry()">Save</button>
          </div>
        </div>
      `;
          })
          .catch((err) => {
            result.innerHTML = "<p>Error: " + err.message + "</p>";
          });
      }

      function saveCountry() {
        let saved = JSON.parse(localStorage.getItem("countries")) || [];

        if (saved.some((c) => c.name === currentCountry.name)) {
          alert("Already saved");
          return;
        }

        saved.push(currentCountry);
        localStorage.setItem("countries", JSON.stringify(saved));

        alert("Saved successfully");
      }
    </script>
  </body>
</html>
