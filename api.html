<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rey Cafe Menu</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="nav-buttons">
        <a href="index.html">Home</a>
        <a href="saved.html">Favorites</a>
      </div>

      <h1>Rey Cafe Menu</h1>
      <p>Search and save your favorite drinks, pastries, and snacks</p>
    </header>

    <main>
      <h2>Search Our Cafe Menu</h2>

      <form
        onsubmit="
          event.preventDefault();
          searchMeal();
        "
      >
        <label>Enter Drink or Food Name</label>
        <input
          type="text"
          id="mealInput"
          placeholder="e.g. Coffee, Cake, Sandwich"
        />
        <button type="submit">Search</button>
      </form>

      <div id="mealResult"></div>
    </main>

    <footer>
      <p>&copy; 2026 Rey Cafe</p>
    </footer>

    <script>
      function searchMeal() {
        const input = document.getElementById("mealInput").value.trim();
        const result = document.getElementById("mealResult");

        if (!input) {
          result.innerHTML = "<p>Please enter a food or drink.</p>";
          return;
        }

        result.innerHTML = "<p>Loading menu...</p>";

        fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${input}`)
          .then((res) => res.json())
          .then((data) => {
            if (!data.meals) {
              result.innerHTML = "<p>No items found.</p>";
              return;
            }

            result.innerHTML = "";

            data.meals.forEach((meal) => {
              const mealData = {
                name: meal.strMeal,
                category: meal.strCategory,
                image: meal.strMealThumb,
              };

              const mealCard = document.createElement("div");
              mealCard.classList.add("profile-card");
              mealCard.innerHTML = `
                <img src="${mealData.image}">
                <h2>${mealData.name}</h2>
                <p><strong>Category:</strong> ${mealData.category}</p>
                <div class="profile-actions">
                  <button onclick='saveMeal("${mealData.name}", "${mealData.category}", "${mealData.image}")'>Save</button>
                </div>
              `;

              result.appendChild(mealCard);
            });
          })
          .catch(() => {
            result.innerHTML = "<p>Error loading menu.</p>";
          });
      }

      function saveMeal(name, category, image) {
        const currentMeal = { name, category, image };
        let saved = JSON.parse(localStorage.getItem("meals")) || [];

        if (saved.some((m) => m.name === currentMeal.name)) {
          alert("Already saved");
          return;
        }

        saved.push(currentMeal);
        localStorage.setItem("meals", JSON.stringify(saved));
        alert("Saved successfully");
      }
    </script>
  </body>
</html>
